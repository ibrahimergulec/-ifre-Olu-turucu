<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Şifre Üretici</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            color: #e0e0e0;
        }
        h1 {
            font-size: 1.5rem;
            margin: 10px 0 20px;
            color: #00d4aa;
            text-shadow: 0 0 10px rgba(0,212,170,0.3);
        }
        .main-display {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            color: #fff;
            background: rgba(255,255,255,0.05);
            padding: 20px 30px;
            border-radius: 16px;
            border: 2px solid rgba(0,212,170,0.3);
            margin-bottom: 10px;
            min-width: 220px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .main-display.new {
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .history-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #888;
            min-width: 220px;
            text-align: center;
        }
        .history-box span {
            color: #00d4aa;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }
        button {
            padding: 16px;
            font-size: 1.1rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.96); }
        .btn-generate {
            background: linear-gradient(135deg, #00d4aa, #00a884);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,212,170,0.3);
        }
        .btn-generate:hover { box-shadow: 0 6px 20px rgba(0,212,170,0.4); }
        .btn-approve {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: #fff;
            box-shadow: 0 4px 15px rgba(74,144,217,0.3);
        }
        .btn-approve:hover { box-shadow: 0 6px 20px rgba(74,144,217,0.4); }
        .btn-approve:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
        }
        .info {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            line-height: 1.5;
        }
        .info kbd {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #00d4aa;
            color: #1a1a2e;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
<base target="_blank">
</head>
<body>
    <h1>🔐 Şifre Üretici</h1>

    <div class="main-display" id="display">------</div>

    <div class="history-box" id="historyBox">
        Son 2: <span id="last1">-</span>, <span id="last2">-</span> | 3. onay: <span id="third">-</span>
    </div>

    <div class="btn-group">
        <button class="btn-generate" id="btnGen" onclick="generate()">🎲 Yeni Sayı Üret</button>
        <button class="btn-approve" id="btnApp" onclick="approve()" disabled>✅ Onayla (3. dahil)</button>
    </div>

    <div class="info">
        Son 2 sayıdan farklı 6 haneli sayı üretir.<br>
        3. onaylandığında ilk tahmin silinir.
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let history = [];      // Tüm üretilen sayılar
        let current = null;    // Şu anki sayı
        let approvedCount = 0; // Onay sayısı

        function generate() {
            let num;
            // Son 2 sayıdan farklı olmalı
            do {
                num = Math.floor(100000 + Math.random() * 900000).toString();
            } while (history.length >= 1 && history[history.length - 1] === num) {
                // Tekrar kontrol
                num = Math.floor(100000 + Math.random() * 900000).toString();
            }
            // Son 2'den farklı kontrolü (en az 2 eleman varsa)
            if (history.length >= 2) {
                while (history[history.length - 1] === num || history[history.length - 2] === num) {
                    num = Math.floor(100000 + Math.random() * 900000).toString();
                }
            } else if (history.length === 1) {
                while (history[0] === num) {
                    num = Math.floor(100000 + Math.random() * 900000).toString();
                }
            }

            current = num;
            history.push(num);

            const disp = document.getElementById('display');
            disp.textContent = num;
            disp.classList.remove('new');
            void disp.offsetWidth; // reflow
            disp.classList.add('new');

            document.getElementById('btnApp').disabled = false;
            updateHistoryBox();
        }

        function approve() {
            if (!current) return;

            approvedCount++;
            showToast('✅ Onaylandı! (' + approvedCount + '. onay)');

            // 3. onaylandığında ilk tahmini sil
            if (approvedCount === 3) {
                if (history.length >= 3) {
                    const removed = history.shift(); // İlk elemanı sil
                    showToast('🗑️ İlk tahmin (' + removed + ') silindi!');
                }
                approvedCount = 0;
            }

            document.getElementById('btnApp').disabled = true;
            current = null;
            document.getElementById('display').textContent = '------';
            updateHistoryBox();
        }

        function updateHistoryBox() {
            const len = history.length;
            document.getElementById('last1').textContent = len >= 1 ? history[len-1] : '-';
            document.getElementById('last2').textContent = len >= 2 ? history[len-2] : '-';
            document.getElementById('third').textContent = approvedCount > 0 ? approvedCount + '/3' : '-';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
