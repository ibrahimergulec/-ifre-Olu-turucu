<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Hoş Geldin 🚀</title>

            color: #e5e7eb;

        h1 { color: #38bdf8; }

<body>
    <div class="box">
        <h1>Site Yayında 🎉</h1>
        <p>Bakımdayız Anlayışınız İçin teşekkürler</p>
